<style>
  /* Variables y estilos base */
  :root {
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    user-select: none;
    background-color: #F5F5F7;
  }

  /* Ocultar barra de scroll en navegadores */
  ::-webkit-scrollbar {
    width: 0px;
    background: transparent;
  }

  /* Animación Láser del Escáner */
  @keyframes scanLaser {
    0% {
      top: 5%;
      opacity: 0.2;
    }
    50% {
      top: 50%;
      opacity: 1;
    }
    100% {
      top: 95%;
      opacity: 0.2;
    }
  }

  .animate-laser {
    animation: scanLaser 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  /* Animación de entrada suave (Fade In) */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(4px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in {
    animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* Animación desde abajo para modals y detalles (Fade In Up) */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(100%);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fade-in-up {
    animation: fadeInUp 0.35s cubic-bezier(0.32, 0.94, 0.6, 1) forwards;
  }

  /* Animación lenta de pulse */
  @keyframes pulseSlow {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.6;
    }
  }

  .animate-pulse-slow {
    animation: pulseSlow 3s infinite;
  }

  /* Personalización del Lector HTML5-QRCode */
  #reader__dashboard_section_csr {
    display: none !important;
  }
  
  #reader__status_span {
    display: none !important;
  }

  #reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
  }

  #reader {
    border: none !important;
    background: #000;
  }

  /* Esquinas redondeadas personalizadas */
  .rounded-card {
    border-radius: 24px;
  }

  /* Estilos específicos para evitar rebote de PWA en móviles */
  html, body {
    overscroll-behavior-y: contain;
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* El contenedor con scroll interno */
  body > div {
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
</style>
