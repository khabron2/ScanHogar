<script>
  // Inicializar Lucide Icons
  lucide.createIcons();

  // Variables globales de la app
  let html5QrcodeScanner = null;
  let activeView = 'inicio';
  let deferredInstallPrompt = null;
  let currentCameraId = null;
  let allCameras = [];
  let isFlashOn = false;

  // Cache en memoria para búsquedas locales rápidas
  const localCache = new Map();

  // Inicializar al cargar el DOM
  document.addEventListener("DOMContentLoaded", () => {
    inicializarNavegacion();
    inicializarBusquedaManual();
    inicializarEscaner();
    inicializarPWA();
    cargarNovedades(); // Carga de novedades en segundo plano
  });

  // Mostrar Notificaciones (Toast)
  function showToast(message, duration = 3000) {
    const toast = document.getElementById("toast");
    const toastMsg = document.getElementById("toast-message");
    toastMsg.innerText = message;
    toast.style.opacity = "1";
    toast.style.pointerEvents = "auto";
    
    setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.pointerEvents = "none";
    }, duration);
  }

  // Navegación / Cambio de Pantallas (Inicio, Novedades)
  function inicializarNavegacion() {
    const navInicio = document.getElementById("nav-inicio");
    const navNovedades = document.getElementById("nav-novedades");
    const inicioView = document.getElementById("inicio-view");
    const novedadesView = document.getElementById("novedades-view");

    function irAInicio() {
      if (activeView === 'inicio') return;
      activeView = 'inicio';
      
      // Cambiar clases de botones
      navInicio.className = "flex flex-col items-center gap-1 text-blue-600 font-semibold transition-all";
      navInicio.querySelector("div").className = "w-12 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center transition-all duration-300";
      
      navNovedades.className = "flex flex-col items-center gap-1 text-neutral-400 hover:text-neutral-600 transition-all";
      navNovedades.querySelector("div").className = "w-12 h-8 rounded-full bg-transparent text-neutral-400 flex items-center justify-center transition-all duration-300";
      
      // Mostrar/Ocultar vistas
      inicioView.classList.remove("hidden");
      novedadesView.classList.add("hidden");
      detenerEscaner();
    }

    function irANovedades() {
      if (activeView === 'novedades') return;
      activeView = 'novedades';
      
      // Cambiar clases de botones
      navNovedades.className = "flex flex-col items-center gap-1 text-blue-600 font-semibold transition-all";
      navNovedades.querySelector("div").className = "w-12 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center transition-all duration-300";
      
      navInicio.className = "flex flex-col items-center gap-1 text-neutral-400 hover:text-neutral-600 transition-all";
      navInicio.querySelector("div").className = "w-12 h-8 rounded-full bg-transparent text-neutral-400 flex items-center justify-center transition-all duration-300";
      
      // Mostrar/Ocultar vistas
      novedadesView.classList.remove("hidden");
      inicioView.classList.add("hidden");
      detenerEscaner();
      cargarNovedades(); // Recargar novedades al entrar
    }

    navInicio.addEventListener("click", irAInicio);
    navNovedades.addEventListener("click", irANovedades);
    
    // Botones de cierre de detalle de producto
    document.getElementById("btn-cerrar-detalle").addEventListener("click", cerrarDetalleProducto);
    document.getElementById("btn-re-escanear").addEventListener("click", () => {
      cerrarDetalleProducto();
      abrirLectorCamara();
    });
  }

  // Búsqueda Manual
  function inicializarBusquedaManual() {
    const inputCodigo = document.getElementById("input-codigo");
    const btnLimpiar = document.getElementById("btn-limpiar-busqueda");
    const btnBuscar = document.getElementById("btn-buscar");

    inputCodigo.addEventListener("input", () => {
      if (inputCodigo.value.trim().length > 0) {
        btnLimpiar.classList.remove("hidden");
      } else {
        btnLimpiar.classList.add("hidden");
      }
    });

    btnLimpiar.addEventListener("click", () => {
      inputCodigo.value = "";
      btnLimpiar.classList.add("hidden");
      inputCodigo.focus();
    });

    btnBuscar.addEventListener("click", () => {
      const codigo = inputCodigo.value.trim();
      if (codigo.length === 0) {
        showToast("Por favor ingrese un código de barras");
        return;
      }
      buscarYMostrarProducto(codigo);
    });

    // Permitir buscar con el botón Enter del teclado móvil
    inputCodigo.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        btnBuscar.click();
        inputCodigo.blur(); // Ocultar teclado
      }
    });
  }

  // Inicialización del Lector de Códigos de Barra de la Cámara
  function inicializarEscaner() {
    const btnAbrirEscaner = document.getElementById("btn-abrir-escaner");
    const btnCerrarEscaner = document.getElementById("btn-cerrar-escaner");
    const btnToggleFlash = document.getElementById("btn-toggle-flash");
    const btnSwitchCamera = document.getElementById("btn-switch-camera");

    btnAbrirEscaner.addEventListener("click", abrirLectorCamara);
    btnCerrarEscaner.addEventListener("click", detenerEscaner);

    // Cambio de cámara (trasera / frontal)
    btnSwitchCamera.addEventListener("click", () => {
      if (allCameras.length <= 1) {
        showToast("No se detectaron más cámaras");
        return;
      }
      const currentIndex = allCameras.findIndex(c => c.id === currentCameraId);
      const nextIndex = (currentIndex + 1) % allCameras.length;
      currentCameraId = allCameras[nextIndex].id;
      reiniciarEscanerConCamara(currentCameraId);
    });

    // Control de Linterna (si el navegador y cámara lo soportan)
    btnToggleFlash.addEventListener("click", async () => {
      if (!html5QrcodeScanner) return;
      
      try {
        isFlashOn = !isFlashOn;
        // La API de html5-qrcode para flash se aplica a la pista de video de la cámara activa
        const isTorchSupported = html5QrcodeScanner.isTorchSupported();
        if (isTorchSupported) {
          await html5QrcodeScanner.applyVideoConstrains({
            advanced: [{ torch: isFlashOn }]
          });
          btnToggleFlash.querySelector("span").innerText = isFlashOn ? "Apagar Linterna" : "Encender Linterna";
          btnToggleFlash.classList.toggle("bg-amber-600", isFlashOn);
          btnToggleFlash.classList.toggle("text-white", isFlashOn);
        } else {
          showToast("La linterna no es compatible con este dispositivo");
          isFlashOn = !isFlashOn;
        }
      } catch (err) {
        console.error("Error al controlar linterna:", err);
        showToast("No se pudo activar la linterna");
        isFlashOn = false;
      }
    });
  }

  // Abre la cámara y arranca el escáner de códigos de barras
  function abrirLectorCamara() {
    document.getElementById("scanner-container").classList.remove("hidden");
    
    // Obtener las cámaras disponibles en el dispositivo
    Html5Qrcode.getCameras().then(cameras => {
      allCameras = cameras;
      if (cameras && cameras.length > 0) {
        // Preferir cámara trasera ("back" o "environment")
        const backCamera = cameras.find(camera => 
          camera.label.toLowerCase().includes("back") || 
          camera.label.toLowerCase().includes("trasera") ||
          camera.label.toLowerCase().includes("environment")
        );
        
        currentCameraId = backCamera ? backCamera.id : cameras[0].id;
        
        // Ocultar botón de switch si solo hay una cámara
        if (cameras.length <= 1) {
          document.getElementById("btn-switch-camera").classList.add("opacity-50", "pointer-events-none");
        } else {
          document.getElementById("btn-switch-camera").classList.remove("opacity-50", "pointer-events-none");
        }
        
        arrancarEscaner(currentCameraId);
      } else {
        showToast("No se encontraron cámaras en el dispositivo");
        detenerEscaner();
      }
    }).catch(err => {
      console.error("Error obteniendo cámaras:", err);
      showToast("Permiso de cámara denegado");
      detenerEscaner();
    });
  }

  // Inicia la cámara de html5-qrcode
  function arrancarEscaner(cameraId) {
    if (html5QrcodeScanner) {
      html5QrcodeScanner.clear();
    }

    html5QrcodeScanner = new Html5Qrcode("reader");
    
    const config = {
      fps: 15,
      qrbox: (width, height) => {
        // Caja de escaneo optimizada para códigos de barra (ancha y más baja)
        return {
          width: Math.min(width * 0.85, 280),
          height: Math.min(height * 0.45, 140)
        };
      },
      aspectRatio: 1.777778, // 16:9
    };

    html5QrcodeScanner.start(
      cameraId,
      config,
      (decodedText) => {
        // ÉXITO AL ESCANEAR CÓDIGO
        detenerEscaner();
        playScanSound(); // Efecto sonoro de éxito
        buscarYMostrarProducto(decodedText);
      },
      (errorMessage) => {
        // Falla de escaneo silenciosa (escaneando activamente...)
      }
    ).then(() => {
      // Habilitar o deshabilitar botón de flash según soporte
      setTimeout(() => {
        const isTorchSupported = html5QrcodeScanner.isTorchSupported();
        const flashBtn = document.getElementById("btn-toggle-flash");
        if (!isTorchSupported) {
          flashBtn.classList.add("opacity-40", "pointer-events-none");
        } else {
          flashBtn.classList.remove("opacity-40", "pointer-events-none");
        }
      }, 500);
    }).catch(err => {
      console.error("Error arrancando escáner:", err);
      showToast("Error al iniciar cámara");
      detenerEscaner();
    });
  }

  function reiniciarEscanerConCamara(cameraId) {
    if (html5QrcodeScanner) {
      html5QrcodeScanner.stop().then(() => {
        arrancarEscaner(cameraId);
      }).catch(err => {
        console.error("Error reiniciando escáner:", err);
        arrancarEscaner(cameraId);
      });
    }
  }

  // Detiene el lector de códigos
  function detenerEscaner() {
    document.getElementById("scanner-container").classList.add("hidden");
    isFlashOn = false;
    document.getElementById("btn-toggle-flash").querySelector("span").innerText = "Encender Linterna";
    document.getElementById("btn-toggle-flash").classList.remove("bg-amber-600", "text-white");
    
    if (html5QrcodeScanner) {
      try {
        html5QrcodeScanner.stop().then(() => {
          html5QrcodeScanner.clear();
          html5QrcodeScanner = null;
        }).catch(() => {
          html5QrcodeScanner = null;
        });
      } catch (e) {
        html5QrcodeScanner = null;
      }
    }
  }

  // Sonido de Escaneo (Efecto sonoro para una UX fluida)
  function playScanSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); // Frecuencia alta y corta (beep de escáner)
      oscillator.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.08);
      
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
      
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.12);
      
      // Intentar vibración si es soportado (Android)
      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    } catch (e) {
      console.log("AudioContext no soportado o bloqueado");
    }
  }

  // Buscar el producto por código (llama a Apps Script)
  function buscarYMostrarProducto(codigo) {
    if (!codigo) return;
    
    // Mostrar modal con skeleton loading
    abrirModalDetalle(true);

    // Verificar en caché local primero
    if (localCache.has(codigo)) {
      mostrarDatosEnDetalle(localCache.get(codigo));
      return;
    }

    // Verificar si estamos ejecutando en Google Apps Script
    if (typeof google !== "undefined" && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler((producto) => {
          if (producto && !producto.error) {
            localCache.set(codigo, producto); // Cachear localmente
            mostrarDatosEnDetalle(producto);
          } else {
            mostrarProductoNoEncontrado();
          }
        })
        .withFailureHandler((err) => {
          console.error("Error buscando producto en backend:", err);
          mostrarProductoNoEncontrado();
        })
        .BuscarProducto(codigo);
    } else {
      // Simulación offline si se ejecuta localmente / fuera del entorno Sheets
      setTimeout(() => {
        const productosDemo = obtenerProductosDemoMock();
        const producto = productosDemo.find(p => p.codigo === codigo);
        if (producto) {
          localCache.set(codigo, producto);
          mostrarDatosEnDetalle(producto);
        } else {
          mostrarProductoNoEncontrado();
        }
      }, 700);
    }
  }

  // Abre el contenedor modal para detalle de producto
  function abrirModalDetalle(conSkeleton = true) {
    const container = document.getElementById("detalle-producto-container");
    container.classList.remove("hidden");
    
    const skeleton = document.getElementById("detalle-skeleton");
    const datos = document.getElementById("detalle-datos");
    const errorSection = document.getElementById("detalle-error");

    if (conSkeleton) {
      skeleton.classList.remove("hidden");
      datos.classList.add("hidden");
      errorSection.classList.add("hidden");
    } else {
      skeleton.classList.add("hidden");
      datos.classList.remove("hidden");
      errorSection.classList.add("hidden");
    }
  }

  function cerrarDetalleProducto() {
    document.getElementById("detalle-producto-container").classList.add("hidden");
  }

  // Rellena la tarjeta con los datos del producto encontrado
  function mostrarDatosEnDetalle(producto) {
    const skeleton = document.getElementById("detalle-skeleton");
    const datos = document.getElementById("detalle-datos");
    const errorSection = document.getElementById("detalle-error");

    skeleton.classList.add("hidden");
    errorSection.classList.add("hidden");
    datos.classList.remove("hidden");

    // Rellenar campos
    document.getElementById("prod-marca").innerText = producto.marca || "Sin Marca";
    document.getElementById("prod-descripcion").innerText = producto.descripcion || "Producto sin descripción";
    document.getElementById("prod-unidad-val").innerText = producto.unidad || "No especificado";
    
    // Dar formato de moneda de Argentina/local
    const precioFormateado = new Intl.NumberFormat('es-AR', {
      style: 'currency',
      currency: 'ARS',
      minimumFractionDigits: 0
    }).format(producto.precio || 0);
    
    document.getElementById("prod-precio").innerText = precioFormateado;

    // Manejar foto
    const imgElement = document.getElementById("prod-foto");
    const imgPlaceholder = document.getElementById("prod-foto-placeholder");
    
    if (producto.foto && producto.foto.trim() !== "") {
      imgElement.src = producto.foto;
      imgElement.classList.remove("hidden");
      imgPlaceholder.classList.add("hidden");
    } else {
      imgElement.src = "";
      imgElement.classList.add("hidden");
      imgPlaceholder.classList.remove("hidden");
    }

    // Manejar Stock
    const stockContainer = document.getElementById("prod-stock-container");
    const stockIcon = document.getElementById("prod-stock-icon");
    const stockText = document.getElementById("prod-stock-text");

    const stock = Number(producto.stock) || 0;
    if (stock <= 0) {
      stockText.innerText = "Agotado / Sin stock";
      stockText.className = "text-sm font-bold text-rose-600";
      stockIcon.className = "w-10 h-10 rounded-xl flex items-center justify-center text-rose-600 bg-rose-100";
      stockIcon.innerHTML = `<i data-lucide="alert-triangle" class="w-5 h-5"></i>`;
    } else if (stock <= 5) {
      stockText.innerText = `${stock} unidades (¡Poco stock!)`;
      stockText.className = "text-sm font-semibold text-amber-600";
      stockIcon.className = "w-10 h-10 rounded-xl flex items-center justify-center text-amber-600 bg-amber-100";
      stockIcon.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5"></i>`;
    } else {
      stockText.innerText = `${stock} unidades disponibles`;
      stockText.className = "text-sm font-semibold text-neutral-800";
      stockIcon.className = "w-10 h-10 rounded-xl flex items-center justify-center text-emerald-600 bg-emerald-100";
      stockIcon.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5"></i>`;
    }

    lucide.createIcons(); // Re-renderizar nuevos iconos cargados en stockIcon
  }

  // Muestra pantalla "Producto no encontrado"
  function mostrarProductoNoEncontrado() {
    const skeleton = document.getElementById("detalle-skeleton");
    const datos = document.getElementById("detalle-datos");
    const errorSection = document.getElementById("detalle-error");

    skeleton.classList.add("hidden");
    datos.classList.add("hidden");
    errorSection.classList.remove("hidden");
    showToast("Producto no encontrado");
  }

  // Carga y renderiza el catálogo en la sección Novedades
  function cargarNovedades() {
    const skeletons = document.getElementById("novedades-skeletons");
    const grid = document.getElementById("novedades-grid");
    const vacio = document.getElementById("novedades-vacio");
    const btnActualizar = document.getElementById("btn-actualizar-novedades");

    skeletons.classList.remove("hidden");
    grid.classList.add("hidden");
    vacio.classList.add("hidden");
    
    if (btnActualizar) btnActualizar.classList.add("animate-spin");

    const onSuccess = (novedades) => {
      skeletons.classList.add("hidden");
      if (btnActualizar) btnActualizar.classList.remove("animate-spin");

      if (!novedades || novedades.length === 0) {
        vacio.classList.remove("hidden");
        document.getElementById("novedades-count").innerText = "0";
        return;
      }

      document.getElementById("novedades-count").innerText = novedades.length;
      grid.innerHTML = ""; // Limpiar productos anteriores
      
      novedades.forEach(p => {
        const card = document.createElement("div");
        // Diseño de tarjeta bento moderna similar a Mercado Libre / Material 3
        card.className = "bg-white border border-neutral-100 rounded-2xl p-3 flex flex-col hover:border-blue-100 transition-all cursor-pointer active:scale-[0.98] animate-fade-in shadow-sm relative";
        
        // Crear formato de precio
        const precioFormateado = new Intl.NumberFormat('es-AR', {
          style: 'currency',
          currency: 'ARS',
          minimumFractionDigits: 0
        }).format(p.precio || 0);

        // Estructura de imagen o placeholder
        let imageHtml = "";
        if (p.foto && p.foto.trim() !== "") {
          imageHtml = `<img src="${p.foto}" class="w-full aspect-square object-contain p-2 rounded-xl bg-neutral-50" alt="${p.descripcion}">`;
        } else {
          imageHtml = `
            <div class="w-full aspect-square bg-neutral-50 text-neutral-300 rounded-xl flex flex-col items-center justify-center p-2">
              <i data-lucide="image" class="w-10 h-10" style="stroke-width: 1px"></i>
            </div>
          `;
        }

        card.innerHTML = `
          <div class="relative w-full overflow-hidden mb-3">
            ${imageHtml}
            <span class="absolute top-1.5 left-1.5 bg-neutral-900/50 backdrop-blur-sm text-white font-bold text-[8px] tracking-wider px-2 py-0.5 rounded-full uppercase">${p.marca || "S/M"}</span>
          </div>
          <h3 class="text-xs font-semibold text-neutral-800 line-clamp-2 h-8 leading-tight mb-1" title="${p.descripcion}">${p.descripcion}</h3>
          <p class="text-[10px] text-neutral-500 mb-2 flex items-center gap-1">
            <i data-lucide="package" class="w-3 h-3 text-neutral-400"></i>
            <span>${p.unidad || "-"}</span>
          </p>
          <div class="flex items-center justify-between mt-auto pt-2 border-t border-neutral-50">
            <span class="text-sm font-extrabold text-[#34A853]">${precioFormateado}</span>
            <button class="text-xs font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg hover:bg-blue-100 transition-colors">Ver</button>
          </div>
        `;

        // Al hacer clic en la tarjeta de novedades, abre el detalle del producto directamente
        card.addEventListener("click", () => {
          abrirModalDetalle(false);
          mostrarDatosEnDetalle(p);
        });

        grid.appendChild(card);
      });

      grid.classList.remove("hidden");
      lucide.createIcons(); // Crear iconos de las tarjetas
    };

    const onFailure = (err) => {
      console.error("Error al cargar novedades:", err);
      skeletons.classList.add("hidden");
      if (btnActualizar) btnActualizar.classList.remove("animate-spin");
      vacio.classList.remove("hidden");
      showToast("Error de conexión");
    };

    // Consulta real de Apps Script o Mock local
    if (typeof google !== "undefined" && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .ObtenerNovedades();
    } else {
      // Simulación offline
      setTimeout(() => {
        onSuccess(obtenerProductosDemoMock());
      }, 500);
    }
  }

  // Soporte para Progressive Web App (PWA) e Instalación
  function inicializarPWA() {
    const installBanner = document.getElementById("install-banner");
    const btnInstall = document.getElementById("btn-install");

    // Escuchar el evento de instalación que envía el navegador
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      installBanner.classList.remove("hidden");
    });

    btnInstall.addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      console.log(`Elección de instalación del usuario: ${outcome}`);
      
      deferredInstallPrompt = null;
      installBanner.classList.add("hidden");
    });

    window.addEventListener('appinstalled', () => {
      console.log('La aplicación de consulta de precios ha sido instalada.');
      installBanner.classList.add("hidden");
      showToast("¡Aplicación instalada con éxito!");
    });
  }
